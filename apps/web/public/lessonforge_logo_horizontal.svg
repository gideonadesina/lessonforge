<svg width="600" height="100" viewBox="0 0 600 100" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>LessonForge horizontal logo</title>
  <desc>LessonForge horizontal logo — book spark icon with wordmark</desc>

  <!-- Purple rounded square -->
  <rect x="10" y="10" width="80" height="80" rx="18" fill="#6C63FF"/>

  <!-- Book left page -->
  <path d="M22,72 L49,62 L49,34 L22,44 Z" fill="white"/>
  <!-- Book right page -->
  <path d="M49,62 L76,72 L76,44 L49,34 Z" fill="white" opacity="0.78"/>
  <!-- Spine -->
  <line x1="49" y1="32" x2="49" y2="74" stroke="#6C63FF" stroke-width="2.2"/>

  <!-- 4-pointed spark -->
  <path d="M50,29 L54,17 L58,29 L70,33 L58,37 L54,49 L50,37 L38,33 Z" fill="white"/>

  <!-- Wordmark -->
  <text x="106" y="52" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" letter-spacing="-1">
    <tspan fill="#1a1a2e">Lesson</tspan><tspan fill="#6C63FF">Forge</tspan>
  </text>

  <!-- Tagline -->
  <text x="107" y="72" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="400" fill="#7C3AED" letter-spacing="2">AI FOR AFRICA'S CLASSROOMS</text>
</svg>
